<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuxedo Active Camouflage Simulator V2</title>
    <style>
        body {
            background-color: #0b1120;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* The Physical Desk Environment */
        #desk-environment {
            width: 1200px;
            height: 700px;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            position: relative;
            border: 2px solid #334155;
            overflow: hidden;
            background-repeat: no-repeat;
            transition: background-color 0.3s;
        }

        /* The Laptop Lid (Draggable) */
        #laptop-lid {
            width: 350px; 
            height: 225px;
            position: absolute;
            top: 230px;
            left: 425px;
            border-radius: 12px;
            cursor: grab;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.4);
            transition: box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(135deg, rgba(226,232,240,0.8) 0%, rgba(148,163,184,0.8) 100%);
            backdrop-filter: blur(4px);
            background-repeat: no-repeat;
        }

        #laptop-lid:active {
            cursor: grabbing;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.4);
        }

        #scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #8b5cf6;
            box-shadow: 0 0 15px 5px rgba(139, 92, 246, 0.8);
            display: none;
            pointer-events: none;
            border-radius: 5px;
        }

        .controls { 
            margin-top: 25px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            z-index: 10;
        }
        
        input[type="file"] { display: none; }
        input[type="range"] { accent-color: #38bdf8; cursor: pointer; width: 120px; }
        
        .btn {
            background: #0f172a; color: #38bdf8; border: 1px solid #38bdf8;
            padding: 10px 15px; font-family: monospace; cursor: pointer;
            border-radius: 6px; transition: all 0.2s; font-weight: bold; text-transform: uppercase;
            font-size: 13px;
        }
        .btn:hover { background: #38bdf8; color: #000; }
        .btn:disabled { border-color: #475569; color: #475569; cursor: not-allowed; background: #0f172a; }
        
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: #0f172a;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .slider-group label { font-size: 11px; color: #94a3b8; font-family: monospace; }
        
        #status { color: #94a3b8; font-family: monospace; font-size: 13px; margin-left: 10px; min-width: 200px;}
    </style>
</head>
<body>

    <div id="desk-environment">
        <div id="laptop-lid">
            <div id="scanner-line"></div>
        </div>
    </div>

    <div class="controls">
        <label class="btn">
            <input type="file" id="deskmat-upload" accept=".png,.jpg,.jpeg" />
            1. Lay Deskmat
        </label>
        
        <div class="slider-group">
            <label>ZOOM: <span id="scale-val">100%</span></label>
            <input type="range" id="zoom-slider" min="20" max="300" value="100" oninput="updateDeskmatScale()" disabled>
        </div>

        <button class="btn" id="btn-print" onclick="bakeCamouflage()" disabled>2. Bake UV</button>
        <button class="btn" id="btn-toggle" onclick="toggleDeskmat()" disabled>Toggle Desk</button>
        <button class="btn" id="btn-export" onclick="exportSVG()" disabled>Export SVG</button>
        <button class="btn" onclick="resetLid()">Reset</button>
        <span id="status">Upload your osu! deskmat.</span>
    </div>

    <script>
        const desk = document.getElementById('desk-environment');
        const lid = document.getElementById('laptop-lid');
        const scanner = document.getElementById('scanner-line');
        const statusText = document.getElementById('status');
        const btnPrint = document.getElementById('btn-print');
        const btnToggle = document.getElementById('btn-toggle');
        const btnExport = document.getElementById('btn-export');
        const zoomSlider = document.getElementById('zoom-slider');
        
        let deskmatUrl = '';
        let nativeImgWidth = 0;
        let nativeImgHeight = 0;
        let isCamouflaged = false;
        let deskmatVisible = true;
        
        // Export variables
        let bgW = 0, bgH = 0;
        let bgOffsetX = 0, bgOffsetY = 0;
        let lidOffsetX = 0, lidOffsetY = 0;

        // --- DRAG AND DROP ---
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        lid.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = lid.offsetLeft;
            initialTop = lid.offsetTop;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let newX = initialLeft + (e.clientX - startX);
            let newY = initialTop + (e.clientY - startY);
            
            newX = Math.max(0, Math.min(newX, desk.offsetWidth - lid.offsetWidth));
            newY = Math.max(0, Math.min(newY, desk.offsetHeight - lid.offsetHeight));
            
            lid.style.left = newX + 'px';
            lid.style.top = newY + 'px';

            if (isCamouflaged && deskmatVisible) {
                statusText.innerText = "Camouflage broken. Return to docking coords.";
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // --- UPLOAD LOGIC ---
        document.getElementById('deskmat-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                deskmatUrl = event.target.result;
                
                const img = new Image();
                img.onload = function() {
                    nativeImgWidth = img.width;
                    nativeImgHeight = img.height;
                    
                    zoomSlider.disabled = false;
                    zoomSlider.value = 100;
                    updateDeskmatScale();
                    
                    desk.style.backgroundImage = `url(${deskmatUrl})`;
                    deskmatVisible = true;
                    resetLid();
                    statusText.innerText = "Deskmat placed. Adjust zoom, then drag laptop.";
                }
                img.src = deskmatUrl;
            };
            reader.readAsDataURL(file);
        });

        function updateDeskmatScale() {
            if (!nativeImgWidth) return;
            
            const zoomMultiplier = zoomSlider.value / 100;
            document.getElementById('scale-val').innerText = zoomSlider.value + '%';
            
            // Calculate pixel dimensions of the scaled image
            bgW = desk.offsetWidth * zoomMultiplier;
            bgH = bgW * (nativeImgHeight / nativeImgWidth);
            
            // Calculate centering offsets
            bgOffsetX = (desk.offsetWidth - bgW) / 2;
            bgOffsetY = (desk.offsetHeight - bgH) / 2;

            desk.style.backgroundSize = `${bgW}px ${bgH}px`;
            desk.style.backgroundPosition = `${bgOffsetX}px ${bgOffsetY}px`;
        }

        function resetLid() {
            isCamouflaged = false;
            lid.style.background = 'linear-gradient(135deg, rgba(226,232,240,0.8) 0%, rgba(148,163,184,0.8) 100%)';
            lid.style.backgroundSize = 'auto';
            
            btnToggle.disabled = true;
            btnExport.disabled = true;
            zoomSlider.disabled = false;
            
            // BUG FIX: Re-enable the bake button if an image is loaded
            if (deskmatUrl) btnPrint.disabled = false;
            
            statusText.innerText = deskmatUrl ? "Ready to print coordinates." : "Upload your osu! deskmat.";
            if (deskmatUrl && !deskmatVisible) toggleDeskmat();
        }

        // --- THE PRINTING LOGIC ---
        function bakeCamouflage() {
            if (!deskmatUrl) return;
            
            btnPrint.disabled = true;
            zoomSlider.disabled = true; // Lock zoom once printed
            statusText.innerText = "UV Curing exact coordinates...";
            scanner.style.display = 'block';
            
            // Core Math: Find laptop relative to desk, then subtract the image's center offset
            const lidRect = lid.getBoundingClientRect();
            const deskRect = desk.getBoundingClientRect();
            
            lidOffsetX = (lidRect.left - deskRect.left) - bgOffsetX;
            lidOffsetY = (lidRect.top - deskRect.top) - bgOffsetY;

            let scanPos = 0;
            function scan() {
                scanPos += 6;
                scanner.style.top = scanPos + 'px';
                
                if (scanPos < lid.offsetHeight) {
                    requestAnimationFrame(scan);
                } else {
                    scanner.style.display = 'none';
                    scanner.style.top = '0px';
                    
                    lid.style.background = `url(${deskmatUrl})`;
                    lid.style.backgroundSize = `${bgW}px ${bgH}px`;
                    lid.style.backgroundPosition = `-${lidOffsetX}px -${lidOffsetY}px`;
                    
                    isCamouflaged = true;
                    btnToggle.disabled = false;
                    btnExport.disabled = false;
                    statusText.innerText = "Camouflage locked. Try toggling the desk.";
                }
            }
            scan();
        }

        function toggleDeskmat() {
            if (!deskmatUrl) return;
            deskmatVisible = !deskmatVisible;
            desk.style.backgroundImage = deskmatVisible ? `url(${deskmatUrl})` : 'none';
            statusText.innerText = deskmatVisible ? "Environment restored." : "Environment deleted. Laptop isolated.";
        }

        // --- THE EXPORTER ---
        function exportSVG() {
            if (!isCamouflaged) return;

            const svgWidth = lid.offsetWidth;
            const svgHeight = lid.offsetHeight;

            // Notice how the image width/height uses our exact scaled pixel dimensions (bgW, bgH)
            const svgString = `
<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}">
    <defs>
        <clipPath id="lidClip">
            <rect width="${svgWidth}" height="${svgHeight}" rx="12" ry="12" />
        </clipPath>
    </defs>
    <g clip-path="url(#lidClip)">
        <image href="${deskmatUrl}" x="-${lidOffsetX}" y="-${lidOffsetY}" width="${bgW}" height="${bgH}" preserveAspectRatio="none" />
    </g>
</svg>`.trim();

            const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "tuxedo_active_camo.svg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            statusText.innerText = "Exported mathematically perfect SVG.";
        }
    </script>
</body>
</html>
