{% extends "base.html" %}

{% block title %}Edit Contest - {{ contest.name }}{% endblock %}

{% block content %}
<div class="col-md-8 mx-auto">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="m-0">Edit Contest: {{ contest.name }}</h5>
        </div>
        <div class="card-body">
            <form action="/admin/edit_contest/{{ contest.id }}" method="post">
                <div class="mb-3">
                    <label class="form-label">Contest Name</label>
                    <input type="text" name="name" class="form-control" value="{{ contest.name }}" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Start Time (Timestamp)</label>
                        <input type="number" name="start_time" class="form-control" value="{{ contest.start_time | int }}" required>
                        <div class="form-text text-muted">{{ contest.start_time | datetime }}</div>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">End Time (Timestamp)</label>
                        <input type="number" name="end_time" class="form-control" value="{{ contest.end_time | int }}" required>
                        <div class="form-text text-muted">{{ contest.end_time | datetime }}</div>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="/admin" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
