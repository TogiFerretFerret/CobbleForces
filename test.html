<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuxedo Magnesium Lid Printer</title>
    <style>
        body {
            background-color: #0b1120;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e2e8f0;
        }

        /* The Magnesium Alloy Laptop Lid */
        .lid-chassis {
            width: 700px;
            height: 450px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 40%, #94a3b8 100%);
            border-radius: 24px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6), 
                inset 0 2px 4px rgba(255,255,255,0.8),
                inset 0 -4px 10px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden; 
            border: 1px solid #cbd5e1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* The UV Inkjet Print Head */
        #print-head {
            position: absolute;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(to bottom, #1e293b 50%, #8b5cf6 50%);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4), 0 0 15px rgba(139, 92, 246, 0.8);
            border-bottom: 2px solid #c4b5fd;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .controls { 
            margin-top: 40px; 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            background: #1e293b;
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        input[type="file"] { display: none; }
        input[type="range"] { accent-color: #38bdf8; cursor: pointer; }
        
        .btn {
            background: #0f172a; color: #38bdf8; border: 1px solid #38bdf8;
            padding: 10px 20px; font-family: monospace; cursor: pointer;
            border-radius: 6px; transition: all 0.2s; font-weight: bold; text-transform: uppercase;
        }
        .btn:hover { background: #38bdf8; color: #000; }
        .btn:disabled { border-color: #475569; color: #475569; cursor: not-allowed; background: #0f172a; }
        
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .slider-group label { font-size: 11px; color: #94a3b8; font-family: monospace; }
        
        #status { color: #94a3b8; font-family: monospace; font-size: 13px; margin-left: 10px; min-width: 180px; }
    </style>
</head>
<body>

    <div class="lid-chassis">
        <canvas id="lid-canvas" width="1400" height="900"></canvas>
        <div id="print-head"></div>
    </div>

    <div class="controls">
        <label class="btn">
            <input type="file" id="image-upload" accept=".svg,.png,.jpg,.jpeg" />
            1. Upload
        </label>

        <div class="slider-group">
            <label>CHASSIS COVERAGE: <span id="scale-val">30%</span></label>
            <input type="range" id="logo-scale" min="5" max="95" value="30" oninput="updateScaleText()">
        </div>

        <button class="btn" id="btn-print" onclick="triggerPrint()" disabled>2. UV Print</button>
        <button class="btn" onclick="resetLid()">Clear</button>
        
        <span id="status">Awaiting artwork...</span>
    </div>

    <script>
        const canvas = document.getElementById('lid-canvas');
        const ctx = canvas.getContext('2d');
        const printHead = document.getElementById('print-head');
        const statusText = document.getElementById('status');
        const btnPrint = document.getElementById('btn-print');
        
        let isSimulating = false;
        let loadedImage = null;

        function updateScaleText() {
            document.getElementById('scale-val').innerText = document.getElementById('logo-scale').value + '%';
        }

        function resetLid() {
            if (isSimulating) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            printHead.style.display = 'none';
            statusText.innerText = loadedImage ? "Lid cleared. Ready to reprint." : "Awaiting artwork...";
        }

        document.getElementById('image-upload').addEventListener('change', function(e) {
            if (isSimulating) return;
            const file = e.target.files[0];
            if (!file) return;
            
            statusText.innerText = "Processing artwork...";
            btnPrint.disabled = true;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                let dataUrl = event.target.result;

                // SVG Zero-Dimension Interceptor
                if (file.type === 'image/svg+xml') {
                    try {
                        const svgText = atob(dataUrl.split(',')[1]);
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(svgText, 'image/svg+xml');
                        const svgEl = doc.documentElement;
                        
                        if (!svgEl.getAttribute('width')) svgEl.setAttribute('width', '1000');
                        if (!svgEl.getAttribute('height')) svgEl.setAttribute('height', '1000');
                        
                        const serializer = new XMLSerializer();
                        dataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(serializer.serializeToString(svgEl))));
                    } catch (err) {
                        console.warn("Could not patch SVG.", err);
                    }
                }

                const img = new Image();
                img.onload = function() {
                    if (img.width === 0) return statusText.innerText = "Error: Invalid image bounds.";
                    loadedImage = img;
                    btnPrint.disabled = false;
                    statusText.innerText = "Artwork loaded. Adjust scale and Print.";
                };
                img.src = dataUrl;
            };
            reader.readAsDataURL(file);
        });

        function triggerPrint() {
            if (!loadedImage || isSimulating) return;
            startUVPrinting(loadedImage);
        }

        function startUVPrinting(img) {
            isSimulating = true;
            btnPrint.disabled = true;
            
            // Clear the metal before the new print
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            printHead.style.display = 'block';
            statusText.innerText = "Printing...";
            
            // THE NEW MATH: Calculate scale based strictly on the user's slider percentage
            const userScalePercent = document.getElementById('logo-scale').value / 100;
            
            // The maximum allowed width/height based on the slider percentage of the canvas
            const maxLogoWidth = canvas.width * userScalePercent;
            const maxLogoHeight = canvas.height * userScalePercent;
            
            // Scale the image down to fit inside that user-defined box while keeping aspect ratio
            const scale = Math.min(maxLogoWidth / img.width, maxLogoHeight / img.height);
            const drawWidth = img.width * scale;
            const drawHeight = img.height * scale;
            
            // Perfectly center the newly scaled logo on the lid
            const offsetX = (canvas.width - drawWidth) / 2;
            const offsetY = (canvas.height - drawHeight) / 2;

            const totalScanLines = canvas.height;
            let currentLine = 0;
            const step = 8; // Printer carriage speed

            function drawRasterFrame() {
                const percentDone = (currentLine / totalScanLines) * 100;
                printHead.style.top = percentDone + '%';

                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, canvas.width, currentLine);
                ctx.clip();

                ctx.globalCompositeOperation = 'source-over';
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
                ctx.restore();

                currentLine += step;
                
                if (currentLine <= totalScanLines + step) {
                    requestAnimationFrame(drawRasterFrame);
                } else {
                    printHead.style.display = 'none';
                    isSimulating = false;
                    btnPrint.disabled = false;
                    statusText.innerText = "UV Curing Complete.";
                }
            }
            drawRasterFrame();
        }
    </script>
</body>
</html>
